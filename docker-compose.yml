services:
  db:
    image: postgres:16-alpine
    container_name: mvc_default_db
    environment:
      POSTGRES_DB: mvcdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mvcdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: mvc_default_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/mvcdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8181:8080"
    restart: unless-stopped

volumes:
  pgdata: